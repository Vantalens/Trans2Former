name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: npm test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The OCR model vendors (public/vendor/{paddleocr,tesseract,onnxruntime})
      # are intentionally absent in a fresh clone; the test chain skips their
      # integration cases and gates everything else.
      #
      # Coverage gate (.c8rc.json): statements/lines >= 78%, functions >= 80%,
      # branches >= 64% over public/** (vendor excluded). These are ratchet
      # floors pinned just below the current measured coverage (81.38/85.56/71.95)
      # so coverage can only go up — raise them as the test rebuild lands.
      - name: Run test suite with coverage gate
        run: npm run coverage

      - name: Generate coverage reports
        run: |
          npx c8 report --reporter=json-summary --reporter=text
          npx c8 report --reporter=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-summary.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-node-${{ matrix.node }}
          path: coverage/
          retention-days: 7
