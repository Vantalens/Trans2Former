name: Auto Merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    if: github.actor == 'Vantalens' || github.actor == 'dependabot[bot]'

    steps:
      - name: Check CI status
        id: check-ci
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            const ciCheck = checks.check_runs.find(run => run.name.includes('npm test'));
            if (!ciCheck) {
              console.log('CI check not found yet, waiting...');
              return 'pending';
            }

            console.log(`CI status: ${ciCheck.status} / ${ciCheck.conclusion}`);
            return ciCheck.conclusion;

      - name: Wait for CI to complete
        if: steps.check-ci.outputs.result == 'pending'
        run: |
          echo "Waiting for CI to complete..."
          sleep 30

      - name: Auto approve PR
        if: steps.check-ci.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: '✅ Auto-approved: All tests passed with coverage ≥ 80%'
            });

      - name: Enable auto-merge
        if: steps.check-ci.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
              commit_title: context.payload.pull_request.title,
              commit_message: `${context.payload.pull_request.body}\n\nAuto-merged after passing CI ✅`
            });

      - name: Comment on failure
        if: steps.check-ci.outputs.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '❌ CI checks failed. Please fix the issues before merging.'
            });
