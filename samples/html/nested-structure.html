<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nested Structure Example</title>
</head>
<body>
    <div class="container">
        <section class="content">
            <h1>Main Title</h1>
            <div class="subsection">
                <h2>Subsection 1</h2>
                <p>This is a paragraph with <strong>bold</strong> and <em>italic</em> text.</p>
                <div class="nested">
                    <h3>Nested Heading</h3>
                    <ul>
                        <li>Item 1</li>
                        <li>Item 2
                            <ul>
                                <li>Nested Item 2.1</li>
                                <li>Nested Item 2.2</li>
                            </ul>
                        </li>
                        <li>Item 3</li>
                    </ul>
                </div>
            </div>
            <div class="subsection">
                <h2>Subsection 2</h2>
                <p>Another paragraph with a <a href="https://example.com">link</a>.</p>
                <blockquote>
                    <p>This is a quote.</p>
                </blockquote>
            </div>
        </section>
    </div>
</body>
</html>
