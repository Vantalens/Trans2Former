<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trans2Former · 独立预览</title>
    <meta name="description" content="Trans2Former 独立预览 — 高质量本地预览页。" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/styles/preview.css" />
  </head>
  <body class="preview-body" data-view="preview">
    <header class="preview-topbar">
      <div class="preview-topbar-left">
        <a class="preview-back" href="/#/workbench" data-preview-back title="返回工作台">
          <svg viewBox="0 0 24 24" aria-hidden="true" width="18" height="18"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>返回工作台</span>
        </a>
        <div class="preview-meta">
          <strong id="previewTitle">独立预览</strong>
          <span id="previewSubtitle"></span>
        </div>
      </div>
      <div class="preview-topbar-right">
        <div class="preview-zoom-controls" id="previewZoomControls" hidden>
          <button type="button" class="preview-tool-button" data-zoom="out" title="缩小">−</button>
          <span id="previewZoomLevel" class="preview-zoom-level">100%</span>
          <button type="button" class="preview-tool-button" data-zoom="in" title="放大">+</button>
          <button type="button" class="preview-tool-button" data-zoom="reset" title="重置缩放">重置</button>
        </div>
        <button id="previewDownloadButton" class="preview-tool-button preview-tool-primary" type="button" disabled>下载</button>
      </div>
    </header>

    <main id="previewStage" class="preview-stage" aria-live="polite">
      <div id="previewEmpty" class="preview-empty">
        <h1>正在准备预览…</h1>
        <p>如果长时间未显示，可能是预览数据已过期，请返回工作台重新生成。</p>
        <a class="preview-back-cta" href="/#/workbench" data-preview-back>返回工作台</a>
      </div>
    </main>

    <script type="module" src="/preview.js"></script>
  </body>
</html>
